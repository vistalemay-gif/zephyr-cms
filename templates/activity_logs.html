<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activity Logs - Zephyr CMS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .logs-table { max-width: 1000px; margin:2rem auto; border-collapse: collapse; width:100%; }
  .logs-table th, .logs-table td { border:1px solid #81e4df; padding:8px; text-align:center; }
  .logs-table th { background:#81e4df; color:white; }
</style>
</head>
<body>
  <h2 style="text-align:center;">Activity Logs</h2>
  <style>
body { background:#f4f6f9; font-family: Arial; }

.logs-container {
    width: 80%;
    margin: auto;
}

.log-card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    border-left: 5px solid #00bcd4;
}

.log-card.alert {
    border-left: 5px solid red;
    background: #fff5f5;
}

.log-user {
    font-weight: bold;
}

.log-time {
    font-size: 12px;
    color: gray;
}
</style>

<div class="logs-container">
    <h2>📜 Activity Logs</h2>

    {% if logs %}
        {% for log in logs %}
            <div class="log-card {% if 'ALERT' in log.action %}alert{% endif %}">
                <div class="log-user">{{ log.user }}</div>
                <div>{{ log.action }}</div>
                <div class="log-time">{{ log.timestamp }}</div>
            </div>
        {% endfor %}
    {% else %}
        <p>No activity logs yet.</p>
    {% endif %}
</div>

<br>
<a href="{{ url_for('dashboard') }}">⬅ Back to Dashboard</a>
</body>
</html>
