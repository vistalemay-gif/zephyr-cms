<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; text-align: center; padding-top: 50px; }
        form { background: white; padding: 30px; width: 350px; margin: auto; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input, button { width: 90%; margin: 10px 0; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; border: none; cursor: pointer; }
        a { display: block; margin-top: 15px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <form method="POST">
        <h2>Create Account</h2>
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Register</button>
        <a href="/login">Back to Login</a>
    </form>
</body>
</html>
